name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install (workspaces)
        run: bun install --frozen-lockfile
      - name: Typecheck (server + @pramen/client + @pramen/react)
        run: bun run typecheck
      - name: Tests (e2e + client + cli + units)
        run: bun test
        env:
          # wrangler runs fully local (miniflare); no Cloudflare credentials needed.
          WRANGLER_SEND_METRICS: "false"
