name: release

# Publishes @pramen/* to npm via OIDC **trusted publishing** — no NPM_TOKEN.
# The packages have this repo + this workflow (release.yml) registered as a
# trusted publisher on npmjs.com, so npm mints a short-lived OIDC credential at
# publish time (and attaches provenance automatically). Trigger by pushing a
# version tag (e.g. `v0.0.2`) after `bun run bump`, or run manually from the
# Actions tab.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # Node + npm do the actual publish: bun publish has no OIDC/trusted-publishing
      # support, npm (>= 11.5.1) does. Build/typecheck/test still run on bun.
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # Pin npm rather than track @latest: a broken npm@latest global install
      # (missing bundled `sigstore`, needed for --provenance) failed the v0.0.15
      # publish. 11.5.1 is the floor that supports OIDC trusted publishing.
      - name: Use an npm that supports trusted publishing (>= 11.5.1)
        run: npm install -g npm@11.5.1
      - name: Install (workspaces)
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Tests (e2e + units, fully local via miniflare)
        run: bun test
        env:
          WRANGLER_SEND_METRICS: "false"
      - name: Publish @pramen/* (build + publish in dependency order)
        run: bun run release
